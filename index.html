<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game: Two Egos</title>
    <style>
        :root {
            --bg-app: #1a1d24;
            --bg-header: #252933;
            --text-primary: #FFFFFF;
            --text-secondary: #AFB0B4;
            --text-time: rgba(255, 255, 255, 0.5);
            
            --kirill-color: linear-gradient(90deg, #00C6FF 0%, #0072FF 100%);
            --lera-color: linear-gradient(90deg, #FF512F 0%, #DD2476 100%);
            
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-main);
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background-color: var(--bg-app);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            border: 8px solid #333;
            transition: filter 0.5s;
        }

        .phone-frame.blocked {
            filter: grayscale(100%) blur(2px);
        }

        /* ===== ГЛАВНОЕ МЕНЮ ===== */
        .main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1d24 0%, #0d0f12 100%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            transition: opacity 0.5s, transform 0.5s;
        }

        .main-menu.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .game-logo {
            font-size: 42px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .game-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 60px;
            text-align: center;
            letter-spacing: 1px;
        }

        .menu-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80') center/cover;
            margin-bottom: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .start-btn {
            width: 280px;
            padding: 18px 40px;
            background: linear-gradient(135deg, #00C6FF 0%, #0072FF 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.4);
            transition: all 0.3s;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 198, 255, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .menu-info {
            margin-top: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.6;
        }

        .menu-info span {
            display: block;
            margin: 5px 0;
        }

        /* ===== ОСТАЛЬНЫЕ СТИЛИ ИГРЫ ===== */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
        }

        .chat-header {
            padding: 10px 16px;
            background: rgba(37, 41, 51, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            position: relative;
        }

        .back-btn { color: white; font-size: 24px; margin-right: 10px; cursor: pointer; }
        
        .avatar-container {
            position: relative;
            width: 40px; height: 40px;
            margin-right: 12px;
        }
        
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80') center/cover;
            transition: filter 0.3s;
        }

        .blocked-icon {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .phone-frame.blocked .blocked-icon {
            opacity: 1;
            transform: scale(1);
        }

        .header-info h1 { color: white; font-size: 18px; font-weight: 600; }
        .header-info span { color: #4CD964; font-size: 12px; transition: color 0.3s; }
        .phone-frame.blocked .header-info span { color: #ff4444; }

        .chat-area {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
            position: relative;
        }
        .chat-area::-webkit-scrollbar { display: none; }

        .message-row {
            display: flex; flex-direction: column; max-width: 85%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .message-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .message-row.sent { align-self: flex-end; align-items: flex-end; }
        .message-row.received { align-self: flex-start; align-items: flex-start; }
        .message-row.image-msg { max-width: 70%; }

        .sender-name { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; margin-left: 4px; }
        
        .bubble {
            padding: 12px 16px; border-radius: 18px; color: white; font-size: 15px; line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            word-wrap: break-word;
        }
        .bubble.sent { border-bottom-right-radius: 4px; background: var(--kirill-color); }
        .bubble.received { border-bottom-left-radius: 4px; background: var(--lera-color); }
        
        .bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
        }

        .time { font-size: 10px; color: var(--text-time); margin-top: 4px; display: block; }
        .message-row.sent .time { text-align: right; }
        .message-row.received .time { text-align: left; margin-left: 4px; }

        .footer {
            padding: 16px; background: var(--bg-header);
            border-top: 1px solid rgba(255,255,255,0.1);
            min-height: 80px; display: flex; align-items: center; justify-content: center;
            position: relative;
            z-index: 20;
        }

        .input-bar {
            width: 100%; height: 44px; background: rgba(255,255,255,0.1);
            border-radius: 22px; display: flex; align-items: center; padding: 0 16px;
            opacity: 0.5; pointer-events: none;
        }

        .choices-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: var(--bg-header); padding: 20px 16px 30px 16px;
            display: flex; flex-direction: column; gap: 12px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 20;
        }
        .choices-container.active { transform: translateY(0); }

        .choice-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 14px; border-radius: 12px; font-size: 13px;
            cursor: pointer; transition: all 0.2s; text-align: left; position: relative;
            font-family: var(--font-main);
            line-height: 1.3;
        }
        .choice-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }
        
        .choice-btn.premium { border: 1px solid #4A90E2; color: #4A90E2; background: rgba(74, 144, 226, 0.05); }
        .choice-desc { font-size: 11px; opacity: 0.7; display: block; margin-top: 4px; }

        .typing-indicator {
            font-size: 12px; color: var(--text-secondary); margin-left: 10px; margin-bottom: 10px;
            display: none; font-style: italic; padding-left: 16px;
        }

        .block-screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .phone-frame.blocked .block-screen-overlay {
            display: flex;
        }

        .block-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }

        .block-icon-large span {
            font-size: 40px;
        }

        .block-title-large {
            font-size: 28px;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .block-reason-large {
            font-size: 16px;
            color: #cccccc;
            margin-bottom: 40px;
            line-height: 1.5;
            max-width: 300px;
        }

        .restart-btn-large {
            padding: 16px 40px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }

        .restart-btn-large:active {
            transform: scale(0.95);
        }

        .final-stats {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 29, 36, 0.95);
            z-index: 150;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .final-stats.visible { display: flex; }
        .stat-item { font-size: 18px; margin: 10px 0; color: #fff; }
        .stat-val { color: #4A90E2; font-weight: bold; }
        .achievement { margin-top: 30px; padding: 15px; border: 1px solid #4A90E2; border-radius: 10px; color: #4A90E2; }

    </style>
</head>
<body>

    <div class="phone-frame" id="phoneFrame">
        
        <!-- ===== ГЛАВНОЕ МЕНЮ ===== -->
        <div class="main-menu" id="mainMenu">
            <div class="menu-avatar"></div>
            <div class="game-logo">Part 2</div>
            <div class="game-subtitle">08\03\2026</div>
            
            <button class="start-btn" onclick="startGame()">Начать игру</button>
            
           
        </div>
        
        <!-- ===== ИГРОВОЙ ИНТЕРФЕЙС ===== -->
        <div class="status-bar">
            <span id="clock">14:15</span>
            <div style="display: flex; gap: 5px;"><span>📶</span><span>🔋</span></div>
        </div>

        <div class="chat-header">
            <div class="back-btn">‹</div>
            <div class="avatar-container">
                <div class="avatar"></div>
                <div class="blocked-icon">🚫</div>
            </div>
            <div class="header-info">
                <h1>Lera</h1>
                <span id="statusText">Online</span>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
        </div>

        <div class="typing-indicator" id="typingIndicator">Lera печатает...</div>

        <div class="block-screen-overlay" id="blockOverlay">
            <div class="block-icon-large">
                <span>🚫</span>
            </div>
            <div class="block-title-large">Вы заблокированы</div>
            <div class="block-reason-large" id="blockReason">Лера не терпит неопределенности. Вы потеряли её интерес.</div>
            <button class="restart-btn-large" onclick="location.reload()">Начать заново</button>
        </div>

        <div class="final-stats" id="finalStats">
            <h2 style="color:white; margin-bottom: 20px;">Свидание назначено</h2>
            <div class="stat-item">💖 Влечение: <span class="stat-val" id="statLove">0</span></div>
            <div class="stat-item">😎 Эго: <span class="stat-val" id="statEgo">0</span></div>
            <div class="stat-item">💎 Потрачено: <span class="stat-val" id="statDiamonds">0</span></div>
            <div class="achievement" id="achievementBox">Достижение: Баланс Эго</div>
            <button class="restart-btn-large" style="margin-top: 30px;" onclick="location.reload()">В меню</button>
        </div>

        <div class="footer">
            <div class="input-bar">
                <div style="color:white; font-size: 20px;">+</div>
                <input type="text" placeholder="Message" disabled>
                <div style="color:white;">➤</div>
            </div>

            <div class="choices-container" id="choicesContainer">
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const choicesContainer = document.getElementById('choicesContainer');
        const typingIndicator = document.getElementById('typingIndicator');
        const phoneFrame = document.getElementById('phoneFrame');
        const statusText = document.getElementById('statusText');
        const blockReasonText = document.getElementById('blockReason');
        const clock = document.getElementById('clock');
        const finalStatsScreen = document.getElementById('finalStats');
        const mainMenu = document.getElementById('mainMenu'); // Главное меню

        let messageQueue = [];
        let isProcessing = false;
        let stats = { love: 0, ego: 0, diamonds: 0 };
        let choiceHistory = [];
        let lastChoiceType = '';
        let lastChoiceText = "";

        // Функция запуска игры (скрывает меню)
        function startGame() {
            mainMenu.classList.add('hidden');
            setTimeout(() => {
                processStep('start');
            }, 500);
        }

        const script = {
            'start': {
                type: 'choice',
                options: [
                    { text: "«Привет. Анализ показал: ты не отвечала 120 часов. Это аномалия даже для твоего графика.»", desc: "😎 Сухое / Аналитическое", type: 'ego', next: 'lera_reply_dry' },
                    { text: "«Здарова. Твоя клиника ещё не обанкротилась без твоих гениальных маркетинговых ходов? Или я просто не в курсе?»", desc: "😏 Странное", type: 'ego', next: 'lera_reply_weird' },
                    { text: "«Привет. Смотрю на календарь и понимаю: среда слишком уныла и сера для такой ослепительной личности, как ты. Твои пациенты не заслуживают тебя в таком настроении.»", desc: "💖 Горячее", type: 'love', next: 'lera_reply_hot' }
                ]
            },
            'lera_reply_dry': { type: 'msg', sender: 'her', text: "Твой анализ неточен. Я отвечала коллеге в общем чате. Но засчитываю попытку.", delay: 3000, next: 'lera_window' },
            'lera_reply_weird': { type: 'msg', sender: 'her', text: "Клиника работает без перебоев. А вот твои шутки иногда дают сбой.", delay: 3000, next: 'lera_window' },
            'lera_reply_hot': { type: 'msg', sender: 'her', text: "Пациенты меня не видят, я в бэк-офисе. Но комплимент принят.", delay: 3000, next: 'lera_window' },
            
            'lera_window': { type: 'msg', sender: 'her', text: "К чему ты клонишь, Кирилл? У меня окно между звонками ровно 5 минут.", delay: 2000, next: 'lera_presentation' },
            'lera_presentation': { type: 'msg', sender: 'her', text: "Готовлю презентацию для совета директоров клиники. Тема: «Увеличение LTV пациента через косметологию».", delay: 2000, next: 'lera_seconds' },
            'lera_seconds': { type: 'msg', sender: 'her', text: "Так что у меня сейчас каждая секунда на учете.", delay: 2000, next: 'choice_reaction' },

            'choice_reaction': {
                type: 'choice',
                options: [
                    { text: "«Совет директоров? Звучит серьёзно. Значит, ты там не просто картинки рисуешь.»", desc: "😎 С интересом", type: 'ego', next: 'lera_invitation' },
                    { text: "«Ты справишься. Ты всегда справляешься. Но даже супергероям нужен перерыв.»", desc: "💖 С поддержкой", type: 'love', next: 'lera_invitation' },
                ]
            },

            'block_1': {
                type: 'block',
                reason: "Вы оскорбили её профессиональную гордость. Лера не прощает неуважения к своей работе.",
                messages: [
                    { sender: 'system', text: "Сообщение прочитано" },
                    { sender: 'her', text: "Ты только что обесценил полгода моей работы.", delay: 3000 },
                    { sender: 'her', text: "Маркетинг в клинике — это не «слайды». Это привлечение пациентов, репутация, доходы. Но тебе этого не понять." },
                    { sender: 'her', text: "У меня нет времени на людей, которые не уважают мою профессию." }
                ]
            },

            'lera_invitation': { type: 'msg', sender: 'her', text: "Ладно, проехали. У меня ещё 3 минуты. Что ты хотел?", delay: 2000, next: 'lera_call' },
            'lera_call': { type: 'msg', sender: 'her', text: "Только быстро. У меня через 10 минут созвон с главврачом. Он сложный человек.", delay: 2000, next: 'lera_doctor' },
            'lera_doctor': { type: 'msg', sender: 'her', text: "Любит, когда ему перечят, но ненавидит, когда ошибаются в цифрах.", delay: 2000, next: 'choice_approach' },
            
            'choice_approach': {
                type: 'choice',
                options: [
                    { text: "«Четверг. Ужин. 20:00. Я знаю место рядом с твоей клиникой.»", desc: "😎 Прямой", type: 'ego', next: 'lera_kpi' },
                    { text: "«Хотел предложить тебе вечер без презентаций и отчётов. Только ты, я и хорошая еда.»", desc: "💖 Мягкий", type: 'love', next: 'lera_kpi' },
                    { text: "«Я проанализировал твоё расписание. Четверг — наименее загруженный день. Я забронировал стол. Не заставляй меня менять планы.»", desc: "💎 Премиум (15💎)", type: 'ego', premium: 15, next: 'lera_analyzed' }
                ]
            },

            'lera_kpi': { type: 'msg', sender: 'her', text: "Четверг? У меня совещание по запуску новой кампании. Клиника открывает отделение косметологии — нужно привлечь аудиторию.", delay: 3000, next: 'lera_kpi_2' },
            'lera_kpi_2': { type: 'msg', sender: 'her', text: "Но Кирилл, я не могу просто так уйти. У меня KPI, отчёты, брифинги с врачами.", delay: 2000, next: 'lera_flow' },
            'lera_flow': { type: 'msg', sender: 'her', text: "Ты понимаешь, что я отвечаю за поток пациентов? Если я уйду раньше, воронка продаж может рухнуть.", delay: 2000, next: 'lera_priority' },
            'lera_priority': { type: 'msg', sender: 'her', text: "Это не просто ужин. Это вопрос приоритетов.", delay: 2000, next: 'choice_argument' },
            'lera_analyzed': { type: 'msg', sender: 'her', text: "Ты проанализировал моё расписание? Это немного жутко. Но... точно. Четверг у меня свободнее. Но Кирилл, я не могу просто так уйти. У меня KPI, отчёты, брифинги с врачами.", delay: 3000, next: 'lera_flow' },

            'choice_argument': {
                type: 'choice',
                options: [
                    { text: "«Именно поэтому тебе нужно отдохнуть. Выгоревший маркетолог = плохие KPI. Я забочусь о твоих показателях.»", desc: "😎 Через работу", type: 'ego', next: 'lera_details' },
                    { text: "«Поток пациентов не иссякнет за один вечер. А ты можешь иссякнуть. Позаботься о себе.»", desc: "💖 Через заботу", type: 'love', next: 'lera_details' },
                    { text: "«Думаешь, не справишься? Я думал, ты лучше. Один вечер не сделает погоду в твоей клинике.»", desc: "😏 Через конкуренцию", type: 'soft', next: 'block_2' }
                ]
            },

            'block_2': {
                type: 'block',
                reason: "Вы поставили под сомнение её компетентность. Лера не терпит манипуляций через работу.",
                messages: [
                    { sender: 'her', text: "Ты пытаешься меня задеть? Это низко.", delay: 2000 },
                    { sender: 'her', text: "Я не доказываю тебе свою эффективность. У меня есть реальные цифры и результаты." },
                    { sender: 'her', text: "Вечер отменяется. Найди девушку, которой нужно доказывать, что она хороша." }

        function renderMessage(msgData, visible = false) {
            if (msgData.sender === 'system') {
                const row = document.createElement('div');
                row.style.textAlign = 'center';
                row.style.fontSize = '10px';
                row.style.color = '#666';
                row.style.margin = '10px 0';
                row.innerText = msgData.text;
                chatArea.appendChild(row);
                scrollToBottom();
                return;
            }

            const row = document.createElement('div');
            row.className = `message-row ${msgData.sender === 'me' ? 'sent' : 'received'} ${msgData.image ? 'image-msg' : ''}`;
            
            let nameHtml = '';
            if (msgData.sender === 'her') {
                nameHtml = `<div class="sender-name">Lera</div>`;
            }

            let contentHtml = msgData.text ? `<div class="bubble ${msgData.sender === 'me' ? 'sent' : 'received'}">${msgData.text}</div>` : '';
            
            if (msgData.image) {
                if (!contentHtml) contentHtml = `<div class="bubble ${msgData.sender === 'me' ? 'sent' : 'received'}"></div>`;
                const imgHtml = `<img src="${msgData.image}" alt="photo">`;
                if(msgData.sender === 'me') {
                     contentHtml = `<div class="bubble sent">${imgHtml}${msgData.text ? '<br>'+msgData.text : ''}</div>`;
                } else {
                     contentHtml = `<div class="bubble received">${msgData.text ? msgData.text+'<br>' : ''}${imgHtml}</div>`;
                }
            }

            row.innerHTML = `
                ${nameHtml}
                ${contentHtml}
                <span class="time">${getCurrentTime()}</span>
            `;
            
            chatArea.appendChild(row);
            if (visible) {
                setTimeout(() => row.classList.add('visible'), 50);
            }
            scrollToBottom();
        }

        function getCurrentTime() {
            const now = new Date();
            return now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'block' : 'none';
            if(show) scrollToBottom();
        }

        function showChoices(options) {
            choicesContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `choice-btn ${opt.premium ? 'premium' : ''}`;
                
                let icon = '';
                if(opt.image) icon = '📸 ';
                
                btn.innerHTML = `
                    ${icon}${opt.text}
                    <span class="choice-desc">${opt.desc}</span>
                `;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    handleChoice(opt);
                };
                choicesContainer.appendChild(btn);
            });
            choicesContainer.classList.add('active');
            isProcessing = false;
        }

        function hideChoices() {
            choicesContainer.classList.remove('active');
        }

        function triggerBlock(reason, messages) {
            let i = 0;
            function playNext() {
                if (i >= messages.length) {
                    phoneFrame.classList.add('blocked');
                    statusText.innerText = "Был(а) недавно";
                    blockReasonText.innerText = reason;
                    isProcessing = false;
                    return;
                }
                
                const msg = messages[i];
                if (msg.sender === 'her') {
                    showTyping(true);
                    setTimeout(() => {
                        showTyping(false);
                        renderMessage(msg, true);
                        i++;
                        setTimeout(playNext, msg.delay || 1500); 
                    }, msg.delay || 1500);
                }
            }
            playNext();
        }

        async function processQueue() {
            if (isProcessing || messageQueue.length === 0) return;
            
            isProcessing = true;
            
            while (messageQueue.length > 0 && isProcessing) {
                const item = messageQueue.shift();
                
                if (item.type === 'choice') {
                    showChoices(item.options);
                    return;
                }

                if (item.type === 'block') {
                    triggerBlock(item.reason, item.messages);
                    return;
                }

                if (item.type === 'branch') {
                    if (item.logic) {
                        const text = item.logic(lastChoiceText);
                        renderMessage({ sender: 'her', text: text }, true);
                        await sleep(1000);
                    }
                    if(item.next) processStep(item.next);
                    return;
                }

                if (item.type === 'end_check') {
                    showEnding();
                    return;
                }

                if (item.type === 'end') {
                    isProcessing = false;
                    return;
                }

                if (item.sender === 'her') {
                    showTyping(true);
                    await sleep(item.delay || 2000);
                    showTyping(false);
                    renderMessage(item, true);
                    await sleep(500);
                } else {
                    renderMessage(item, true);
                    await sleep(1000);
                }
            }
            
            isProcessing = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function handleChoice(option) {
            lastChoiceType = option.type;
            choiceHistory.push(option.type);
            lastChoiceText = option.text;
            
            if (option.type === 'love') stats.love += 1;
            if (option.type === 'ego') stats.ego += 1;
            if (option.premium) {
                stats.diamonds += option.premium;
                stats.love += 1;
                stats.ego += 1;
            }

            hideChoices();
            
            let displayText = option.text.replace(/[«»]/g, '');
            if(option.image) displayText = "📸 Фото отправлено";
            
            renderMessage({ 
                text: displayText, 
                sender: "me",
                image: option.image
            }, true);
            
            setTimeout(() => {
                processStep(option.next);
            }, 800);
        }

        function processStep(stepId) {
            const step = script[stepId];
            if (!step) return;

            if (step.type === 'msg' || step.type === 'branch') {
                messageQueue = [step];
                if (step.next) {
                    loadChain(step.next);
                }
            } else if (step.type === 'choice' || step.type === 'block' || step.type === 'end_check') {
                messageQueue = [step];
            }
            
            processQueue();
        }

        function loadChain(startId) {
            let currentId = startId;
            
            while(currentId) {
                const step = script[currentId];
                if (!step) break;
                
                messageQueue.push(step);
                
                if (step.type === 'choice' || step.type === 'block' || step.type === 'branch' || step.type === 'end_check' || step.type === 'end') {
                    break;
                }
                
                currentId = step.next;
            }
        }

        function showEnding() {
            const loveCount = choiceHistory.filter(c => c === 'love').length;
            const egoCount = choiceHistory.filter(c => c === 'ego').length;
            
            if (loveCount > egoCount + 2) {
                setTimeout(() => {

                        { sender: 'her', text: "Знаешь, я передумала. Мне нужен кто-то, кто знает, чего хочет." },
                        { sender: 'her', text: "Не пиши мне." }
                    ]);
                }, 1000);
                return;
            }

            setTimeout(() => {
                finalStatsScreen.classList.add('visible');
                document.getElementById('statLove').innerText = stats.love;
                document.getElementById('statEgo').innerText = stats.ego;
                document.getElementById('statDiamonds').innerText = stats.diamonds;
                
                if (stats.love >= 3 && stats.ego >= 2) {
                    document.getElementById('achievementBox').style.display = 'block';
                } else {
                    document.getElementById('achievementBox').style.display = 'none';
                }
            }, 1000);
        }

        setInterval(() => {
            const now = new Date();
            clock.innerText = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
        }, 1000);

        // Игра НЕ запускается автоматически - ждём нажатия кнопки в меню
        // window.onload больше не вызывает processStep('start');
